name = "psots-telegram-bot"
main = "src/index.js"
type = "service"
compatibility_date = "2024-01-01"

# KV namespace bindings
[[kv_namespaces]]
binding = "VIOLATIONS"
id = "your_kv_namespace_id"  # Replace after creating namespace

[[kv_namespaces]]
binding = "AUDIT_LOG"
id = "your_audit_kv_namespace_id"  # Replace after creating namespace

# Environment variables
[env.production]
vars = { ADMIN_ID = "989358143" }

# Trigger for webhook (optional, for scheduling cleanup)
[[triggers.crons]]
crons = ["0 0 * * *"]  # Daily at midnight UTC
